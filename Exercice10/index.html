<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercice 10</title>
</head>
<body>
    <h1>Mon premier Site Web</h1>
    <p>Bienvenue sur mon site web !</p>

    <input type="number" id="n" placeholder="Entrez un nombre">
    <button onclick="document.getElementById('result').textContent = printNumbers(+document.getElementById('n').value)">Afficher</button>
    <p id="result"></p>

    <script type="module">
        import printNumbers from './index.js';
        window.printNumbers = printNumbers;
    </script>
</body>
</html>
